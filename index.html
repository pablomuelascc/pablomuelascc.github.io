<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pablo Muelas | Enlaces</title>
    <style>
        /* Estilos generales y fondo */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; /* Fondo oscuro elegante */
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Contenedor principal */
        .container {
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
        }

        /* Foto de perfil */
        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffffff;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Textos del perfil */
        h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .bio {
            font-size: 1rem;
            color: #b3b3b3;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Estilo general de los botones */
        .link-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin-bottom: 15px;
            background-color: #2c2c2c;
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            transition: transform 0.2s, background-color 0.2s;
            box-sizing: border-box;
        }

        /* Efecto al tocar o pasar el ratón */
        .link-btn:hover {
            transform: scale(1.03);
            background-color: #3d3d3d;
        }

        /* Botón específico de Strava (Naranja oficial) */
        .strava-btn {
            background-color: #FC4C02;
            color: #ffffff;
        }
        
        .strava-btn:hover {
            background-color: #e34402; /* Naranja un poco más oscuro al pasar el ratón */
        }
        
        /* Footer pequeñito */
        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Reemplaza la URL de abajo por el enlace a tu foto real -->
        <img src="20260419_IMG_152-12.jpg" alt="Pablo Muelas" class="profile-pic">
        
        <h1>@pablomuelascc</h1>
        <p class="bio">Ciclismo, vatios y controlando la glucosa. Entrenando como un pro, viviendo como un aficionado. </p>
        
        <!-- Enlace a Strava -->
        <a href="https://www.strava.com/athletes/92446924" target="_blank" class="link-btn strava-btn">
            🔥 Sígueme en Strava
        </a>

        <!-- Puedes añadir más enlaces en el futuro copiando y pegando esta línea -->
        <!-- <a href="ENLACE" target="_blank" class="link-btn">Texto del Botón</a> -->
        
        <div class="footer">
            pablomuelascc © 2026
        </div>
    </div>

</body>
</html>
